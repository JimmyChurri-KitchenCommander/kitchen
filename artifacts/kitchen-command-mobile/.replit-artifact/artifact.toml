kind = "mobile"
previewPath = "/mobile/"
title = "Kitchen Command Mobile"
version = "1.0.0"
id = "artifacts/kitchen-command-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 23147

[services.development]
run = "pnpm --filter @workspace/kitchen-command-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kitchen-command-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kitchen-command-mobile", "run", "serve" ]

[services.env]
PORT = "23147"
BASE_PATH = "/mobile/"
