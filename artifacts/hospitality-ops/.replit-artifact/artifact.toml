kind = "web"
previewPath = "/"
title = "Hospitality Ops Platform"
version = "1.0.0"
id = "artifacts/hospitality-ops"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23011

[services.development]
run = "pnpm --filter @workspace/hospitality-ops run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hospitality-ops", "run", "build" ]
publicDir = "artifacts/hospitality-ops/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23011"
BASE_PATH = "/"
