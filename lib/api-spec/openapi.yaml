          type: integer
          description: Food cost confidence 0–100
        level:
          type: string
          enum: [strong, fair, weak]
        factors:
          type: array
          description: Individual factor scores contributing to the overall confidence
          items:
            type: object
            required: [key, label, score, weight, message]
            properties:
              key:
                type: string
                enum: [stocktake_recency, recipe_review_freshness, invoice_consistency, par_integrity]
              label:
                type: string
              score:
                type: integer
                description: Factor score 0–100
              weight:
                type: integer
                description: Factor weight (sums to 100 across all factors)
              message:
                type: string
                description: Plain-English chef-language reason
        signals:
          type: object
          description: Underlying signals used to compute the score
          required: [staleRecipes, suppliersWithGap, parDriftItems, daysSinceLastStocktake]
          properties:
