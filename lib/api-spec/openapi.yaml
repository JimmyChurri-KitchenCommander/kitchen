openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hospitality Ops Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: venues
    description: Venue management
  - name: inventory
    description: Inventory management
  - name: suppliers
    description: Supplier management
  - name: recipes
    description: Recipe management
  - name: waste
    description: Waste logging
  - name: invoices
    description: Invoice management
  - name: dashboard
    description: Today mode dashboard
  - name: analytics
    description: Analytics and reporting
  - name: shares
    description: Share inventory and recipes
  - name: orders
    description: Suggested order generation
  - name: prep-tasks
    description: Prep task board management
  - name: prep-plan
    description: Cover-driven prep planning
  - name: prep-library
    description: Master prep task library management
  - name: cleaning
    description: Cleaning roster management
  - name: temperature
    description: Temperature logging and equipment checks
  - name: chemicals
    description: Chemical safety and MSDS compliance
  - name: compliance
    description: Compliance overview and audit history
  - name: stocktakes
    description: Monthly stocktaking
  - name: menus
    description: Menu management and costing
  - name: serviceMode
    description: Service mode — no-auth quick actions for kitchen staff during live service
  - name: handoverNotes
    description: Shift handover notes
  - name: purchaseOrders
    description: Purchase order management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── VENUES ───────────────────────────────────────────────────────────────
  /venues:
    get:
      operationId: listVenues
      tags: [venues]
      summary: List all venues for the current user
      responses:
        "200":
          description: List of venues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venue"
    post:
      operationId: createVenue
      tags: [venues]
      summary: Create a new venue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenueInput"
      responses:
        "201":
          description: Created venue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"

  /venues/{venueId}:
    get:
      operationId: getVenue
      tags: [venues]
      summary: Get a single venue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Venue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
    patch:
      operationId: updateVenue
      tags: [venues]
      summary: Update a venue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VenueUpdate"
      responses:
        "200":
          description: Updated venue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venue"
    delete:
      operationId: deleteVenue
      tags: [venues]
      summary: Delete a venue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /venues/{venueId}/my-role:
    get:
      operationId: getMyVenueRole
      tags: [venues]
      summary: Get the current user's role for a venue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current user role
          content:
            application/json:
              schema:
                type: object
                required: [role]
                properties:
                  role:
                    type: string
                    enum: [owner, admin, user, removed, none]

  # ─── INVENTORY ────────────────────────────────────────────────────────────
  /venues/{venueId}/inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory items for a venue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create an inventory item
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /venues/{venueId}/inventory/{itemId}:
    get:
      operationId: getInventoryItem
      tags: [inventory]
      summary: Get an inventory item
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update an inventory item
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemUpdate"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete an inventory item
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /venues/{venueId}/inventory/{itemId}/price-history:
    get:
      operationId: getInventoryItemPriceHistory
      tags: [inventory]
      summary: Get cost history for a specific inventory item
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of price history points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceHistoryPoint"

  /venues/{venueId}/inventory/{itemId}/ledger:
    get:
      operationId: getInventoryItemLedger
      tags: [inventory]
      summary: Get stock movement history for a specific inventory item
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of stock movement ledger entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryLedgerEntry"

  /venues/{venueId}/inventory/{itemId}/archive:
    post:
      operationId: archiveInventoryItem
      tags: [inventory]
      summary: Archive (deactivate) an inventory item
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archived item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /venues/{venueId}/inventory/{itemId}/restore:
    post:
      operationId: restoreInventoryItem
      tags: [inventory]
      summary: Restore an archived inventory item
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /venues/{venueId}/inventory/{itemId}/deactivate:
    post:
      operationId: deactivateInventoryItem
      tags: [inventory]
      summary: Deactivate an inventory item (soft off, not archived)
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deactivated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /venues/{venueId}/inventory/{itemId}/reactivate:
    post:
      operationId: reactivateInventoryItem
      tags: [inventory]
      summary: Reactivate a deactivated inventory item back to active
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reactivated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /venues/{venueId}/inventory/inactive:
    get:
      operationId: listInactiveInventory
      tags: [inventory]
      summary: List deactivated (inactive but not archived) inventory items
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of inactive inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /venues/{venueId}/inventory/archived:
    get:
      operationId: listArchivedInventory
      tags: [inventory]
      summary: List archived (inactive) inventory items
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of archived inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /venues/{venueId}/inventory/alerts:
    get:
      operationId: getInventoryAlerts
      tags: [inventory]
      summary: Get critical alerts - low stock, stagnant, expiry risk items
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory alerts grouped by severity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryAlerts"

  /venues/{venueId}/inventory/suggest:
    post:
      operationId: suggestInventoryItemFields
      tags: [inventory]
      summary: Use AI to suggest storage location and category for an inventory item by name
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          description: AI-suggested fields for the inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryAISuggestion"

  /venues/{venueId}/inventory/suggestions:
    get:
      operationId: getStagnantSuggestions
      tags: [inventory]
      summary: Get operational suggestions for stagnant or near-expiry stock
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suggestions for stagnant/near-expiry items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StagnantSuggestion"

  # ─── STOCKTAKES ───────────────────────────────────────────────────────────
  /venues/{venueId}/stocktakes:
    get:
      operationId: listStocktakes
      tags: [stocktakes]
      summary: List stocktakes for a venue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of stocktakes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stocktake"
    post:
      operationId: createStocktake
      tags: [stocktakes]
      summary: Create a new stocktake (draft) pre-populated with current inventory
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StocktakeInput"
      responses:
        "201":
          description: Created stocktake with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StocktakeDetail"

  /venues/{venueId}/stocktakes/{stocktakeId}:
    get:
      operationId: getStocktake
      tags: [stocktakes]
      summary: Get a stocktake with all its items
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: stocktakeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stocktake detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StocktakeDetail"
    delete:
      operationId: deleteStocktake
      tags: [stocktakes]
      summary: Delete a draft stocktake
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: stocktakeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /venues/{venueId}/stocktakes/{stocktakeId}/submit:
    post:
      operationId: submitStocktake
      tags: [stocktakes]
      summary: Submit a stocktake — updates inventory currentStock to actual counts
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: stocktakeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StocktakeSubmitBody"
      responses:
        "200":
          description: Submitted stocktake
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StocktakeDetail"

  /venues/{venueId}/stocktakes/{stocktakeId}/items/section:
    patch:
      operationId: saveStocktakeSection
      tags: [stocktakes]
      summary: Save counts for items in one section without submitting the full stocktake
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: stocktakeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StocktakeSectionSaveBody"
      responses:
        "200":
          description: Section counts saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StocktakeSectionSaveResult"

  # ─── SERVICE MODE ─────────────────────────────────────────────────────────
  /venues/{venueId}/service/config:
    get:
      operationId: getServiceModeConfig
      tags: [serviceMode]
      summary: Bootstrap config for service mode — staff, inventory, equipment
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service mode bootstrap config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceBootstrapConfig"

  /venues/{venueId}/service/prep-tasks/{taskId}/complete:
    patch:
      operationId: completeServicePrepTask
      tags: [serviceMode]
      summary: Toggle a prep task complete or undo (no auth — service mode only)
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                completedBy:
                  type: string
                undo:
                  type: boolean
      responses:
        "200":
          description: Updated prep task

  /venues/{venueId}/service/cleaning-tasks:
    get:
      operationId: listServiceCleaningTasks
      tags: [serviceMode]
      summary: List active cleaning tasks for service mode (no auth)
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of cleaning tasks

  /venues/{venueId}/service/cleaning-tasks/{taskId}/complete:
    post:
      operationId: completeServiceCleaningTask
      tags: [serviceMode]
      summary: Complete a cleaning task during service (no auth)
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [completedBy]
              properties:
                completedBy:
                  type: string
                notes:
                  type: string
      responses:
        "201":
          description: Cleaning log created

  /venues/{venueId}/service/temperature-log:
    post:
      operationId: createServiceTemperatureLog
      tags: [serviceMode]
      summary: Quick temperature log during service (no auth)
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuickTempLogInput"
      responses:
        "201":
          description: Temperature log created with pass/fail status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickTempLogResult"

  /venues/{venueId}/service/waste-log:
    post:
      operationId: createServiceWasteLog
      tags: [serviceMode]
      summary: Quick waste log during service — sets isQuick=true (no auth)
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuickWasteLogInput"
      responses:
        "201":
          description: Waste log created with optional par check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickWasteLogResult"

  # ─── SUPPLIERS ────────────────────────────────────────────────────────────
  /venues/{venueId}/suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List suppliers for a venue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /venues/{venueId}/suppliers/{supplierId}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: supplierId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: supplierId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdate"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: supplierId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /venues/{venueId}/suppliers/cutoffs:
    get:
      operationId: getSupplierCutoffs
      tags: [suppliers]
      summary: Get upcoming order cutoff countdowns for all suppliers
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier cutoff countdowns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierCutoff"

  /venues/{venueId}/suppliers/{supplierId}/price-history:
    get:
      operationId: getSupplierPriceHistory
      tags: [suppliers]
      summary: Get price history for a supplier's products
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: supplierId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Price history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceHistoryEntry"

  /venues/{venueId}/price-comparison:
    get:
      operationId: getPriceComparison
      tags: [suppliers]
      summary: Get all inventory items with supplier and cost for cross-supplier comparison
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Price comparison entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceComparisonEntry"

  # ─── SUGGESTED ORDERS ─────────────────────────────────────────────────────
  /venues/{venueId}/suggested-orders:
    get:
      operationId: getSuggestedOrders
      tags: [orders]
      summary: Get suggested order quantities grouped by supplier
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suggested orders grouped by supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestedOrdersResult"

  # ─── HANDOVER NOTES ──────────────────────────────────────────────────────
  /venues/{venueId}/handover-notes:
    get:
      operationId: listHandoverNotes
      tags: [handoverNotes]
      summary: List handover notes for a venue (pinned first, then newest)
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of handover notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HandoverNote"
    post:
      operationId: createHandoverNote
      tags: [handoverNotes]
      summary: Create a shift handover note
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
