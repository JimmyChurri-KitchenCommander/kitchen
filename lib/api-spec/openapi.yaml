components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── STARTER PACK ───────────────────────────────────────────────────────
    StarterPackInput:
      type: object
      required: [archetype]
      properties:
        archetype:
          type: string
          enum: [cafe, restaurant, bistro, pub, fine_dining, bakery, burger, hotel]
          description: Venue archetype to pre-seed

    StarterPackResult:
      type: object
      required: [archetype, suppliersCreated, inventoryCreated, chemicalsCreated]
      properties:
        archetype:
          type: string
        suppliersCreated:
          type: integer
        inventoryCreated:
          type: integer
        chemicalsCreated:
          type: integer
        message:
          type: string

    # ─── SETUP PROGRESS ─────────────────────────────────────────────────────
    SetupProgressStep:
      type: object
      required: [id, label, description, completed, action, href, unlocks]
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
        completed:
          type: boolean
        count:
          type: integer
        target:
          type: integer
        action:
          type: string
        href:
          type: string
        unlocks:
          type: string

    SetupProgress:
      type: object
      required: [percentComplete, stepsComplete, totalSteps, allComplete, steps]
      properties:
        percentComplete:
          type: integer
        stepsComplete:
          type: integer
        totalSteps:
          type: integer
        allComplete:
          type: boolean
        nextStep:
          $ref: "#/components/schemas/SetupProgressStep"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/SetupProgressStep"

    # ─── VENUE ─────────────────────────────────────────────────────────────
    ServiceWindow:
      type: object
      required: [label, startTime, endTime, enabled]
      properties:
        label:
          type: string
          description: Display name for this service (e.g. Lunch, Dinner)
        startTime:
          type: string
          description: 24-hour time string (HH:MM)
        endTime:
          type: string
          description: 24-hour time string (HH:MM)
        enabled:
          type: boolean

    ServiceModeConfig:
      type: object
      required: [v2Enabled, v3Enabled]
      properties:
        v2Enabled:
          type: boolean
          description: Operational Pressure Layer — pressure score, station loads, reality check
        v3Enabled:
          type: boolean
          description: Operational Intelligence Layer — focus queue, bottleneck detection, stop-doing list

    Venue:
      type: object
      required: [id, name, userId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        userId:
          type: string
        address:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        venueType:
          type: ["string", "null"]
        teamSize:
          type: ["integer", "null"]
        avgCoversPerService:
          type: ["integer", "null"]
        onboardingCompleted:
          type: ["boolean", "null"]
        enabledModules:
          type: ["array", "null"]
          items:
            type: string
        kitchenAreas:
          type: ["array", "null"]
          items:
            type: string
        staffRole:
          type: ["string", "null"]
        serviceWindows:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/ServiceWindow"
          description: Daily service time windows for countdown display
        serviceModeConfig:
          allOf:
            - $ref: "#/components/schemas/ServiceModeConfig"
          nullable: true
          description: Optional intelligence layer configuration (v2/v3 flags)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    VenueInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
        timezone:
          type: string
        currency:
          type: string
        venueType:
          type: string
        teamSize:
          type: integer
        avgCoversPerService:
          type: integer

    VenueUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
        timezone:
          type: string
        currency:
          type: string
        venueType:
          type: string
        teamSize:
          type: integer
        avgCoversPerService:
          type: integer
        onboardingCompleted:
          type: boolean
        enabledModules:
          type: array
          items:
            type: string
        kitchenAreas:
          type: array
          items:
            type: string
        staffRole:
          type: string
        serviceWindows:
          type: array
          items:
            $ref: "#/components/schemas/ServiceWindow"
          description: Daily service time windows for countdown display
        serviceModeConfig:
          $ref: "#/components/schemas/ServiceModeConfig"
          description: Optional intelligence layer configuration (v2/v3 flags)

    # ─── INVENTORY ─────────────────────────────────────────────────────────
    InventoryItem:
      type: object
      required: [id, venueId, name, unit, currentStock, averageCost, parLevel, stagnantDays, status, stockType, isActive, createdAt]
      properties:
        id:
          type: integer
        venueId:
          type: integer
        name:
          type: string
        unit:
          type: string
        currentStock:
          type: number
        averageCost:
          type: number
        parLevel:
          type: number
        supplierId:
          type: ["integer", "null"]
        supplierName:
          type: ["string", "null"]
        shelfLifeDays:
          type: ["integer", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
          description: Explicit expiry date for this stock batch
        stagnantDays:
          type: integer
        status:
          type: string
          enum: [healthy, low_stock, stagnant, expiry_risk, critical]
        productionRecipeId:
          type: ["integer", "null"]
          description: If set, this item is produced in-house by this recipe
        productionRecipeName:
          type: ["string", "null"]
        isInHousePrepped:
          type: boolean
        stockType:
          type: string
          enum: [raw, prep, finished]
          description: Kitchen stock layer: raw purchased stock, prep stock, or finished stock
        isActive:
          type: boolean
        lastRestocked:
          type: ["string", "null"]
          format: date-time
        storageLocation:
          type: ["string", "null"]
          description: Where this item is stored (e.g. Cool Room, Dry Store, Freezer)
        category:
          type: ["string", "null"]
          description: Ingredient category (e.g. Fruit & Veg, Meat, Dairy)
        archivedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    PriceHistoryPoint:
      type: object
      required: [id, newPrice, recordedAt]
      properties:
        id:
          type: integer
        oldPrice:
          type: ["number", "null"]
        newPrice:
          type: number
        changePercent:
          type: ["number", "null"]
        recordedAt:
          type: string
          format: date-time

    InventoryLedgerEntry:
      type: object
      required: [id, venueId, inventoryItemId, transactionType, quantityDelta, resultingStock, unitCost, costImpact, reason, createdAt]
      properties:
        id:
          type: integer
        venueId:
          type: integer
        inventoryItemId:
          type: integer
